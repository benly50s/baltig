version: 2

project_name: baltig

before:
  hooks:
    - go mod tidy
    - make completions

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - completions/*

brews:
  - repository:
      owner: benly50s
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/benly50s/baltig"
    description: "GitLab pipeline TUI"
    license: "MIT"
    install: |
      bin.install "baltig"
      bash_completion.install "completions/baltig.bash" => "baltig"
      zsh_completion.install "completions/_baltig" => "_baltig"
      fish_completion.install "completions/baltig.fish"
    test: |
      system "#{bin}/baltig --help"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
